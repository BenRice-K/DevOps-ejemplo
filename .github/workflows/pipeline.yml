name: DevOps Pipeline
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Esto elimina la advertencia de Node.js 20 que te salía antes
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Cachear npm hará que tu pipeline sea mucho más rápida
          cache: 'npm'

      - name: Install dependencies
        # IMPORTANTE: --ignore-scripts evita que Husky intente correr en la nube
        run: npm ci --ignore-scripts

      - name: Run Tests
        run: npm test

      - name: Auditoria de seguridad
        run: npm audit --audit-level=high
        